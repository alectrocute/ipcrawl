# nginx site for ipcrawl. Installed to /etc/nginx/sites-available/ipcrawl and
# symlinked into sites-enabled by setup-vps.sh.
#
# Role: TLS termination for the Cloudflare<->origin hop (Full/strict), restore
# the real visitor IP from Cloudflare's headers so the app's per-IP limiters
# and cf-connecting-ip logic keep working, and reverse-proxy to the Nitro
# node-server on 127.0.0.1:3000. A coarse limit_req is a blunt outer shield;
# the fine-grained per-endpoint budgets live in the app.

# Outer per-IP shield. Generous — the app does the precise metering. This just
# stops a single IP from opening a firehose at the origin. 40 r/s with a burst
# lets real navigation (HTML + a grid of ~24 thumbs) through while capping abuse.
limit_req_zone $binary_remote_addr zone=ipcrawl_edge:10m rate=40r/s;

# Trust Cloudflare's Connecting-IP header, but ONLY when the TCP peer is a
# Cloudflare edge (set_real_ip_from ranges). Regenerated by setup-vps.sh from
# https://www.cloudflare.com/ips-v4 and ips-v6.
include /etc/nginx/cloudflare-realip.conf;

# HTTP: no plaintext origin traffic. Cloudflare talks to us over 443; anything
# hitting :80 directly (scanners) gets a permanent redirect and nothing else.
server {
    listen 80;
    listen [::]:80;
    server_name ipcrawl.com ismycameraexposed.com www.ismycameraexposed.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ipcrawl.com ismycameraexposed.com www.ismycameraexposed.com;

    # Cloudflare Origin CA certificate (15-year, trusted only by Cloudflare).
    # Generate in the CF dashboard (SSL/TLS > Origin Server) and place here.
    ssl_certificate     /etc/ssl/cloudflare/ipcrawl-origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/ipcrawl-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Screenshots can be a few hundred KB; live frames stream through.
    client_max_body_size 2m;
    # Nitro sets its own long-lived cache-control + ETag on assets and images;
    # nginx just needs to pass them through untouched for Cloudflare to cache.
    proxy_http_version 1.1;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/manifest+json;

    location / {
        limit_req zone=ipcrawl_edge burst=80 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserve Cloudflare's visitor-IP header for the app's rate limiters.
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;

        proxy_connect_timeout 5s;
        # Live probes run in the background (waitUntil-style) so responses are
        # quick, but give slow upstream reads headroom.
        proxy_read_timeout 30s;
    }
}
